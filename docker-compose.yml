version: '3.8'

services:
  # Main application server
  guardian-drone:
    build: .
    container_name: campus-guardian-drone
    ports:
      - "8080:8080"
    environment:
      # Cloudinary Configuration
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      
      # Telegram Bot Configuration (Optional)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      
      # OpenWeather API (Optional)
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      
      # System Configuration
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    
    volumes:
      # Persist data, recordings, and models
      - ./data:/app/data
      - ./recordings:/app/recordings
      - ./models_cache:/app/models_cache
      - ./yolov8n-visdrone.pt:/app/yolov8n-visdrone.pt:ro
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/telemetry', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - guardian-network

  # Optional: Raspberry Pi Simulator (for testing without hardware)
  rpi-simulator:
    build:
      context: .
      dockerfile: Dockerfile.rpi-simulator
    container_name: guardian-rpi-simulator
    environment:
      - SERVER_URL=http://guardian-drone:8080
      - DEVICE_ID=SIM-RPi-01
      - LOCATION=Campus South Gate
      - SEND_INTERVAL=3
    depends_on:
      - guardian-drone
    restart: unless-stopped
    networks:
      - guardian-network
    profiles:
      - simulator  # Only start with: docker-compose --profile simulator up

networks:
  guardian-network:
    driver: bridge

volumes:
  guardian-data:
  guardian-recordings:
