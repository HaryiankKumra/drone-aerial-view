<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Guardian Drone - Aerial Surveillance</title>
    <style>
        /* Campus Guardian Drone - Professional Futuristic Design */
        
        :root {
            /* Deep navy/charcoal backgrounds */
            --background: 222 47% 6%;
            --foreground: 210 40% 98%;
            --card: 222 47% 8%;
            --card-foreground: 210 40% 98%;
            
            /* Electric cyan primary */
            --primary: 190 95% 50%;
            --primary-foreground: 222 47% 6%;
            
            /* Steel blue secondary */
            --secondary: 215 25% 18%;
            --secondary-foreground: 210 40% 98%;
            
            /* Muted surfaces */
            --muted: 215 25% 14%;
            --muted-foreground: 215 20% 55%;
            
            /* Borders */
            --border: 215 25% 18%;
            
            /* Alert colors */
            --alert-danger: 0 84% 60%;
            --alert-warning: 38 92% 50%;
            --alert-success: 142 76% 36%;
            --alert-info: 199 89% 48%;
            
            /* Glass effect */
            --glass-bg: 222 47% 8% / 0.6;
            --glass-border: 215 25% 18% / 0.3;
            --glass-glow: 190 95% 50% / 0.15;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: hsl(var(--background));
            color: hsl(var(--foreground));
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Glass card effect */
        .glass-card {
            background: hsl(var(--glass-bg));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid hsl(var(--glass-border));
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        /* Grid pattern background */
        .grid-pattern {
            background-image: 
                linear-gradient(hsl(var(--border) / 0.3) 1px, transparent 1px),
                linear-gradient(90deg, hsl(var(--border) / 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* Monospace data text */
        .mono-data {
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }
        
        /* Glow effect */
        .glow-cyan {
            box-shadow: 0 0 20px hsl(var(--glass-glow));
        }
        
        /* Pulse animation for alerts */
        .pulse-alert {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        /* Scan line effect */
        .scan-line {
            position: relative;
            overflow: hidden;
        }
        
        .scan-line::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, hsl(var(--primary)), transparent);
            animation: scan 3s linear infinite;
            z-index: 10;
            pointer-events: none;
        }
        
        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
        
        /* Header */
        .header {
            height: 64px;
            border-bottom: 1px solid hsl(var(--border));
            background: hsl(var(--card) / 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: hsl(var(--primary) / 0.1);
            border: 1px solid hsl(var(--primary) / 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo svg {
            width: 24px;
            height: 24px;
            color: hsl(var(--primary));
        }
        
        .title-section h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: hsl(var(--foreground));
            margin-bottom: 2px;
        }
        
        .title-section p {
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
        }
        
        .header-stats {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: hsl(var(--primary));
        }
        
        .stat-label {
            font-size: 0.625rem;
            color: hsl(var(--muted-foreground));
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* Main layout */
        .main-container {
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
            min-height: calc(100vh - 64px);
        }
        
        /* Left column */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .video-container {
            position: relative;
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
        }
        
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }
        
        #detectedCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .video-overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            gap: 8px;
        }
        
        .status-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            background: hsl(var(--glass-bg));
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid hsl(var(--glass-border));
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: hsl(var(--alert-danger));
            animation: pulse 2s infinite;
        }
        
        .status-badge.live .status-dot {
            background: hsl(var(--alert-danger));
        }
        
        .video-controls {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        /* Bottom grid */
        .bottom-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }
        
        /* Stats card */
        .stats-card {
            padding: 20px;
        }
        
        .stats-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid hsl(var(--border));
            margin-bottom: 16px;
        }
        
        .stats-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .stat-box {
            background: hsl(var(--secondary) / 0.3);
            padding: 16px 12px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.2s;
        }
        
        .stat-box:hover {
            background: hsl(var(--secondary) / 0.5);
        }
        
        .stat-box-value {
            font-size: 2rem;
            font-weight: 700;
            color: hsl(var(--primary));
        }
        
        .stat-box-label {
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
            margin-top: 4px;
        }
        
        /* Right column - Alerts */
        .right-column {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .alerts-container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .alerts-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid hsl(var(--border));
            margin-bottom: 16px;
        }
        
        .alerts-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .alert-count {
            background: hsl(var(--secondary));
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
        }
        
        .alerts-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .alert-item {
            background: hsl(var(--secondary) / 0.3);
            border: 1px solid hsl(var(--border));
            border-radius: 8px;
            padding: 12px;
            position: relative;
            animation: slideInRight 0.3s ease-out;
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .alert-item.critical {
            background: hsl(var(--alert-danger) / 0.1);
            border-color: hsl(var(--alert-danger) / 0.5);
        }
        
        .alert-item.warning {
            background: hsl(var(--alert-warning) / 0.1);
            border-color: hsl(var(--alert-warning) / 0.5);
        }
        
        .alert-header {
            display: flex;
            align-items: start;
            gap: 12px;
        }
        
        .alert-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: hsl(var(--secondary));
            flex-shrink: 0;
        }
        
        .alert-icon.critical {
            background: hsl(var(--alert-danger) / 0.2);
            color: hsl(var(--alert-danger));
        }
        
        .alert-icon.warning {
            background: hsl(var(--alert-warning) / 0.2);
            color: hsl(var(--alert-warning));
        }
        
        .alert-content {
            flex: 1;
        }
        
        .alert-title {
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 4px;
        }
        
        .alert-time {
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
        }
        
        .severity-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .severity-badge.critical {
            background: hsl(var(--alert-danger) / 0.2);
            color: hsl(var(--alert-danger));
        }
        
        .severity-badge.warning {
            background: hsl(var(--alert-warning) / 0.2);
            color: hsl(var(--alert-warning));
        }
        
        .severity-badge.info {
            background: hsl(var(--alert-info) / 0.2);
            color: hsl(var(--alert-info));
        }
        
        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
        }
        
        .btn-primary:hover {
            background: hsl(var(--primary) / 0.9);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px hsl(var(--primary) / 0.4);
        }
        
        .btn-secondary {
            background: hsl(var(--secondary));
            color: hsl(var(--secondary-foreground));
            border: 1px solid hsl(var(--border));
        }
        
        .btn-secondary:hover {
            background: hsl(var(--secondary) / 0.8);
        }
        
        .btn-danger {
            background: hsl(var(--alert-danger));
            color: white;
        }
        
        .btn-danger:hover {
            background: hsl(var(--alert-danger) / 0.9);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: hsl(var(--muted));
        }
        
        ::-webkit-scrollbar-thumb {
            background: hsl(var(--muted-foreground) / 0.5);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: hsl(var(--muted-foreground) / 0.7);
        }
        
        /* Detection log */
        .detection-log {
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.75rem;
            padding: 12px;
            background: hsl(var(--muted) / 0.3);
            border-radius: 8px;
        }
        
        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid hsl(var(--border));
            color: hsl(var(--muted-foreground));
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-time {
            color: hsl(var(--primary));
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            
            .bottom-grid {
                grid-template-columns: 1fr;
            }
            
            .header-stats {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo-section">
            <div class="logo glow-cyan">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                </svg>
            </div>
            <div class="title-section">
                <h1>Campus Guardian Drone</h1>
                <p>Aerial Surveillance System - Live Monitoring</p>
            </div>
        </div>
        
        <div class="header-stats">
            <div class="stat-item">
                <div class="stat-value mono-data" id="headerPeople">0</div>
                <div class="stat-label">People</div>
            </div>
            <div class="stat-item">
                <div class="stat-value mono-data" id="headerVehicles">0</div>
                <div class="stat-label">Vehicles</div>
            </div>
            <div class="stat-item">
                <div class="stat-value mono-data" id="headerAlerts">0</div>
                <div class="stat-label">Alerts</div>
            </div>
            <div class="stat-item">
                <div class="stat-value mono-data" id="headerFPS">0</div>
                <div class="stat-label">FPS</div>
            </div>
        </div>
    </div>
    
    <!-- Main Container -->
    <div class="main-container">
        <!-- Left Column -->
        <div class="left-column">
            <!-- Video Feed -->
            <div class="glass-card video-container scan-line">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="detectedCanvas"></canvas>
                
                <!-- Video Overlay -->
                <div class="video-overlay">
                    <div class="status-badge live">
                        <div class="status-dot"></div>
                        <span>LIVE</span>
                    </div>
                    <div class="status-badge">
                        <span class="mono-data"><span id="videoFPS">0</span> FPS</span>
                    </div>
                </div>
                
                <!-- Controls -->
                <div class="video-controls">
                    <button class="btn btn-primary" id="startBtn">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        Start Detection
                    </button>
                    <button class="btn btn-danger" id="stopBtn" style="display: none;">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path>
                        </svg>
                        Stop Detection
                    </button>
                    <button class="btn btn-secondary" id="recordBtn">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="4"></circle>
                        </svg>
                        Record
                    </button>
                    <button class="btn btn-secondary" id="recordVideoBtn" style="display: none;">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" fill="red"></circle>
                        </svg>
                        <span id="recordVideoText">Start Recording</span>
                    </button>
                    <button class="btn btn-danger" id="stopVideoBtn" style="display: none;">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <rect x="6" y="6" width="12" height="12" stroke-width="2"></rect>
                        </svg>
                        Stop Recording
                    </button>
                </div>
            </div>
            
            <!-- Bottom Grid -->
            <div class="bottom-grid">
                <!-- Live Statistics -->
                <div class="glass-card stats-card">
                    <div class="stats-header">
                        <div class="stats-title">
                            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color: hsl(var(--primary))">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                            </svg>
                            <span>Live Statistics</span>
                        </div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-box-value mono-data" id="totalPeople">0</div>
                            <div class="stat-box-label">Total People</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-box-value mono-data" id="totalVehicles">0</div>
                            <div class="stat-box-label">Total Vehicles</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-box-value mono-data" id="detectionCount">0</div>
                            <div class="stat-box-label">Detections</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-box-value mono-data" id="uptime">00:00:00</div>
                            <div class="stat-box-label">Uptime</div>
                        </div>
                    </div>
                </div>
                
                <!-- Detection Log -->
                <div class="glass-card stats-card">
                    <div class="stats-header">
                        <div class="stats-title">
                            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color: hsl(var(--primary))">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <span>Detection Log</span>
                        </div>
                    </div>
                    <div class="detection-log mono-data" id="detectionLog">
                        <div class="log-entry"><span class="log-time">System ready</span> - Waiting for detection...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Right Column - Alerts -->
        <div class="right-column">
            <div class="glass-card alerts-container">
                <div class="alerts-header">
                    <div class="alerts-title">
                        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color: hsl(var(--alert-danger))">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                        </svg>
                        <span>Active Alerts</span>
                        <span class="alert-count" id="alertCount">0</span>
                    </div>
                </div>
                <div class="alerts-list" id="alertsList">
                    <div style="text-align: center; color: hsl(var(--muted-foreground)); padding: 40px;">
                        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="opacity: 0.3; margin: 0 auto;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                        </svg>
                        <p style="margin-top: 12px; font-size: 0.875rem;">No active alerts</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // State
        let isDetecting = false;
        let detectionInterval = null;
        let startTime = null;
        let uptimeInterval = null;
        let stats = {
            people: 0,
            vehicles: 0,
            detections: 0,
            alerts: 0
        };
        let alerts = [];
        
        // Elements
        const webcam = document.getElementById('webcam');
        const canvas = document.getElementById('detectedCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const recordBtn = document.getElementById('recordBtn');
        
        // Initialize camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                webcam.srcObject = stream;
                
                webcam.onloadedmetadata = () => {
                    canvas.width = webcam.videoWidth;
                    canvas.height = webcam.videoHeight;
                };
                
                addLog('Camera initialized successfully');
            } catch (err) {
                addLog('ERROR: Camera access denied - ' + err.message, true);
                alert('Camera access required for detection');
            }
        }
        
        // Start detection
        async function startDetection() {
            isDetecting = true;
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-flex';
            
            startTime = Date.now();
            updateUptime();
            uptimeInterval = setInterval(updateUptime, 1000);
            
            addLog('Detection started');
            
            detectionInterval = setInterval(async () => {
                const base64 = captureFrame();
                if (base64) {
                    await sendForDetection(base64);
                }
            }, 500);
        }
        
        // Stop detection
        function stopDetection() {
            isDetecting = false;
            clearInterval(detectionInterval);
            clearInterval(uptimeInterval);
            
            startBtn.style.display = 'inline-flex';
            stopBtn.style.display = 'none';
            
            addLog('Detection stopped');
        }
        
        // Capture frame
        function captureFrame() {
            if (webcam.readyState !== webcam.HAVE_ENOUGH_DATA) return null;
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = webcam.videoWidth;
            tempCanvas.height = webcam.videoHeight;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(webcam, 0, 0);
            
            return tempCanvas.toDataURL('image/jpeg', 0.8).split(',')[1];
        }
        
        // Send for detection
        async function sendForDetection(base64) {
            try {
                const response = await fetch('/detect_annotated', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64 })
                });
                
                const data = await response.json();
                
                if (data.annotated_image) {
                    drawAnnotatedImage(data.annotated_image);
                    updateStats(data.detections || []);
                    updateFPS(data.fps || 0);
                }
            } catch (err) {
                console.error('Detection error:', err);
            }
        }
        
        // Draw annotated image
        function drawAnnotatedImage(base64Image) {
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            // Check if base64Image already has the data URI prefix
            img.src = base64Image.startsWith('data:') ? base64Image : 'data:image/jpeg;base64,' + base64Image;
        }
        
        // Update statistics
        function updateStats(detections) {
            let people = 0;
            let vehicles = 0;
            
            detections.forEach(det => {
                if (['pedestrian', 'people'].includes(det.class)) {
                    people++;
                } else if (['car', 'van', 'truck', 'bus', 'motor', 'bicycle'].includes(det.class)) {
                    vehicles++;
                }
            });
            
            stats.people = people;
            stats.vehicles = vehicles;
            stats.detections++;
            
            document.getElementById('headerPeople').textContent = people;
            document.getElementById('headerVehicles').textContent = vehicles;
            document.getElementById('totalPeople').textContent = people;
            document.getElementById('totalVehicles').textContent = vehicles;
            document.getElementById('detectionCount').textContent = stats.detections;
            
            // Check for alerts
            if (people > 0) {
                checkAndAddAlert(people, 'people');
            }
            if (vehicles > 0) {
                checkAndAddAlert(vehicles, 'vehicles');
            }
            
            // Add log entry
            if (detections.length > 0) {
                const summary = detections.map(d => `${d.class}(${Math.round(d.confidence * 100)}%)`).join(', ');
                addLog(`Detected: ${summary}`);
            }
        }
        
        // Check and add alert
        function checkAndAddAlert(count, type) {
            let severity = 'info';
            let message = '';
            
            if (type === 'people') {
                if (count >= 5) {
                    severity = 'critical';
                    message = `⚠️ CROWD DETECTED: ${count} people in frame`;
                } else {
                    severity = 'warning';
                    message = `👥 Person detected: ${count} people`;
                }
            } else if (type === 'vehicles') {
                severity = 'warning';
                message = `🚗 Vehicle detected: ${count} vehicles`;
            }
            
            addAlert(message, severity);
        }
        
        // Add alert
        function addAlert(message, severity) {
            const now = new Date();
            const alert = {
                id: Date.now(),
                message,
                severity,
                time: now.toLocaleTimeString()
            };
            
            alerts.unshift(alert);
            stats.alerts++;
            
            document.getElementById('headerAlerts').textContent = stats.alerts;
            document.getElementById('alertCount').textContent = alerts.length;
            
            renderAlerts();
            
            // Auto-remove after 30 seconds
            setTimeout(() => {
                alerts = alerts.filter(a => a.id !== alert.id);
                renderAlerts();
                document.getElementById('alertCount').textContent = alerts.length;
            }, 30000);
        }
        
        // Render alerts
        function renderAlerts() {
            const container = document.getElementById('alertsList');
            
            if (alerts.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; color: hsl(var(--muted-foreground)); padding: 40px;">
                        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="opacity: 0.3; margin: 0 auto;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                        </svg>
                        <p style="margin-top: 12px; font-size: 0.875rem;">No active alerts</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = alerts.map(alert => `
                <div class="alert-item ${alert.severity}">
                    <div class="alert-header">
                        <div class="alert-icon ${alert.severity}">
                            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                            </svg>
                        </div>
                        <div class="alert-content">
                            <div class="alert-title">${alert.message}</div>
                            <div class="alert-time mono-data">${alert.time}</div>
                        </div>
                        <span class="severity-badge ${alert.severity}">${alert.severity}</span>
                    </div>
                </div>
            `).join('');
        }
        
        // Update FPS
        function updateFPS(fps) {
            document.getElementById('videoFPS').textContent = fps.toFixed(1);
            document.getElementById('headerFPS').textContent = fps.toFixed(1);
        }
        
        // Update uptime
        function updateUptime() {
            if (!startTime) return;
            
            const elapsed = Date.now() - startTime;
            const hours = Math.floor(elapsed / 3600000);
            const minutes = Math.floor((elapsed % 3600000) / 60000);
            const seconds = Math.floor((elapsed % 60000) / 1000);
            
            const formatted = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            document.getElementById('uptime').textContent = formatted;
        }
        
        // Add log entry
        function addLog(message, isError = false) {
            const log = document.getElementById('detectionLog');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${time}</span> - ${message}`;
            if (isError) entry.style.color = 'hsl(var(--alert-danger))';
            
            log.insertBefore(entry, log.firstChild);
            
            // Keep only last 50 entries
            while (log.children.length > 50) {
                log.removeChild(log.lastChild);
            }
        }
        
        // Manual recording
        async function recordSnapshot() {
            const base64 = captureFrame();
            if (!base64) {
                addLog('ERROR: No frame available to record', true);
                return;
            }
            
            try {
                recordBtn.disabled = true;
                recordBtn.innerHTML = `
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24" style="animation: spin 1s linear infinite;">
                        <circle cx="12" cy="12" r="2"></circle>
                    </svg>
                    Saving...
                `;
                
                const response = await fetch('/record_snapshot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64 })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addLog('✓ Snapshot saved to storage (Event #' + data.event_id + ')');
                    
                    // Visual feedback
                    recordBtn.style.background = 'hsl(var(--alert-success))';
                    setTimeout(() => {
                        recordBtn.style.background = '';
                    }, 1000);
                } else {
                    addLog('ERROR: Failed to save snapshot - ' + data.error, true);
                }
            } catch (err) {
                console.error('Recording error:', err);
                addLog('ERROR: ' + err.message, true);
            } finally {
                recordBtn.disabled = false;
                recordBtn.innerHTML = `
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="4"></circle>
                    </svg>
                    Record
                `;
            }
        }
        
        // Video recording
        let isRecordingVideo = false;
        
        async function startVideoRecording() {
            try {
                const response = await fetch('/start_recording', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    isRecordingVideo = true;
                    recordVideoBtn.style.display = 'none';
                    stopVideoBtn.style.display = 'flex';
                    addLog('🎥 Video recording started');
                } else {
                    addLog('ERROR: ' + data.error, true);
                }
            } catch (err) {
                addLog('ERROR: ' + err.message, true);
            }
        }
        
        async function stopVideoRecording() {
            try {
                const response = await fetch('/stop_recording', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    isRecordingVideo = false;
                    recordVideoBtn.style.display = 'flex';
                    stopVideoBtn.style.display = 'none';
                    
                    const sizeMB = (data.size / 1024 / 1024).toFixed(2);
                    addLog(`✓ Video saved! ${sizeMB}MB`);
                    
                    if (data.cloudinary_url) {
                        addLog(`☁️  Uploaded: ${data.cloudinary_url.substring(0, 50)}...`);
                    }
                } else {
                    addLog('ERROR: ' + data.error, true);
                }
            } catch (err) {
                addLog('ERROR: ' + err.message, true);
            }
        }
        
        // Event listeners
        const recordVideoBtn = document.getElementById('recordVideoBtn');
        const stopVideoBtn = document.getElementById('stopVideoBtn');
        
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            stopBtn.style.display = 'flex';
            recordVideoBtn.style.display = 'flex';
            startDetection();
        });
        
        stopBtn.addEventListener('click', () => {
            stopBtn.style.display = 'none';
            startBtn.style.display = 'flex';
            recordVideoBtn.style.display = 'none';
            if (isRecordingVideo) stopVideoRecording();
            stopDetection();
        });
        
        recordVideoBtn.addEventListener('click', startVideoRecording);
        stopVideoBtn.addEventListener('click', stopVideoRecording);
        
        startBtn.addEventListener('click', startDetection);
        stopBtn.addEventListener('click', stopDetection);
        recordBtn.addEventListener('click', recordSnapshot);
        
        // Initialize
        initCamera();
        addLog('System initialized - Ready for detection');
    </script>
</body>
</html>
