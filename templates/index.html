<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerial Drone Surveillance Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .video-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }
        
        .stats-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }
        
        video, #detectedImage {
            width: 100%;
            border-radius: 10px;
            background: #000;
            margin-bottom: 15px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: #48bb78;
            color: white;
        }
        
        .btn-success:hover {
            background: #38a169;
        }
        
        .btn-danger {
            background: #f56565;
            color: white;
        }
        
        .btn-danger:hover {
            background: #e53e3e;
        }
        
        .status {
            text-align: center;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .status.active {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status.inactive {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .stats-grid {
            display: grid;
            gap: 15px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .stat-card h3 {
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }
        
        .detections-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }
        
        .detection-item {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #48bb78;
        }
        
        .detection-class {
            font-weight: 600;
            color: #333;
            text-transform: capitalize;
        }
        
        .detection-conf {
            background: #48bb78;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        .fps-counter {
            text-align: center;
            font-size: 1.2em;
            color: #667eea;
            margin: 10px 0;
            font-weight: 600;
        }
        
        @media (max-width: 968px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 1.1em;
            padding: 10px;
        }
        
        .loading.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚁 Aerial Drone Surveillance</h1>
        <p class="subtitle">Real-time Object Detection Dashboard | YOLOv8-VisDrone</p>
        
        <div class="dashboard">
            <div class="video-section">
                <video id="video" autoplay playsinline></video>
                <img id="detectedImage" style="display:none;">
                <canvas id="canvas" style="display:none;"></canvas>
                
                <div class="controls">
                    <button class="btn-primary" onclick="startCamera()">📹 Start Camera</button>
                    <button class="btn-success" onclick="startDetection()">▶️ Start Detection</button>
                    <button class="btn-danger" onclick="stopDetection()">⏹️ Stop Detection</button>
                </div>
                
                <div id="status" class="status inactive">Camera: Inactive</div>
                <div class="fps-counter" id="fps">FPS: 0</div>
                <div class="loading" id="loading">Processing...</div>
            </div>
            
            <div class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Objects</h3>
                        <div class="stat-value" id="totalObjects">0</div>
                    </div>
                    
                    <div class="stat-card">
                        <h3>People</h3>
                        <div class="stat-value" id="peopleCount">0</div>
                    </div>
                    
                    <div class="stat-card">
                        <h3>Vehicles</h3>
                        <div class="stat-value" id="vehicleCount">0</div>
                    </div>
                    
                    <div class="stat-card">
                        <h3>Detection Time</h3>
                        <div class="stat-value" id="detectionTime">0ms</div>
                    </div>
                </div>
                
                <h3 style="margin-top: 20px; color: #667eea;">Recent Detections</h3>
                <div class="detections-list" id="detectionsList">
                    <p style="text-align: center; color: #999; padding: 20px;">No detections yet</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let detectionInterval = null;
        let stream = null;
        let fpsInterval = null;
        let frameCount = 0;
        let lastTime = Date.now();
        
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',  // Use back camera on mobile
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                video.srcObject = stream;
                document.getElementById('status').className = 'status active';
                document.getElementById('status').textContent = 'Camera: Active ✓';
            } catch (err) {
                alert('Camera access denied: ' + err.message);
            }
        }
        
        function startDetection() {
            if (!stream) {
                alert('Please start camera first!');
                return;
            }
            
            if (detectionInterval) {
                return; // Already running
            }
            
            // Start FPS counter
            fpsInterval = setInterval(updateFPS, 1000);
            
            // Run detection every 500ms (2 FPS for API calls)
            detectionInterval = setInterval(detectObjects, 500);
            
            document.getElementById('status').textContent = 'Detection: Active ✓';
        }
        
        function stopDetection() {
            if (detectionInterval) {
                clearInterval(detectionInterval);
                detectionInterval = null;
            }
            if (fpsInterval) {
                clearInterval(fpsInterval);
                fpsInterval = null;
            }
            document.getElementById('loading').classList.remove('active');
            document.getElementById('status').textContent = 'Detection: Stopped';
        }
        
        function updateFPS() {
            const now = Date.now();
            const elapsed = (now - lastTime) / 1000;
            const fps = (frameCount / elapsed).toFixed(1);
            document.getElementById('fps').textContent = `FPS: ${fps}`;
            frameCount = 0;
            lastTime = now;
        }
        
        async function detectObjects() {
            const startTime = Date.now();
            document.getElementById('loading').classList.add('active');
            
            // Capture frame
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            // Convert to base64
            const imageData = canvas.toDataURL('image/jpeg', 0.8);
            
            try {
                // Send to API
                const response = await fetch('/detect_annotated', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ image: imageData })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Display annotated image
                    document.getElementById('detectedImage').src = data.annotated_image;
                    document.getElementById('detectedImage').style.display = 'block';
                    video.style.display = 'none';
                    
                    // Update stats
                    updateStats(data);
                    
                    // Update detections list
                    updateDetectionsList(data.detections);
                    
                    frameCount++;
                }
                
                const detectionTime = Date.now() - startTime;
                document.getElementById('detectionTime').textContent = detectionTime + 'ms';
                
            } catch (err) {
                console.error('Detection error:', err);
            }
            
            document.getElementById('loading').classList.remove('active');
        }
        
        function updateStats(data) {
            document.getElementById('totalObjects').textContent = data.total_objects;
            
            // Count people (pedestrian + people)
            const peopleCount = (data.counts.pedestrian || 0) + (data.counts.people || 0);
            document.getElementById('peopleCount').textContent = peopleCount;
            
            // Count vehicles
            const vehicleCount = (data.counts.car || 0) + (data.counts.van || 0) + 
                                (data.counts.truck || 0) + (data.counts.bus || 0) +
                                (data.counts.bicycle || 0) + (data.counts.motor || 0);
            document.getElementById('vehicleCount').textContent = vehicleCount;
        }
        
        function updateDetectionsList(detections) {
            const list = document.getElementById('detectionsList');
            
            if (detections.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">No objects detected</p>';
                return;
            }
            
            list.innerHTML = detections.slice(0, 10).map(det => `
                <div class="detection-item">
                    <span class="detection-class">${det.class}</span>
                    <span class="detection-conf">${(det.confidence * 100).toFixed(0)}%</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
